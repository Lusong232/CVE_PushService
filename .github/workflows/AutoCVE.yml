name: Unified CVE Push Service

on:
  schedule:
    - cron: '0 */3 * * *'   # 每 3 小时运行一次
  workflow_dispatch:       # 手动触发

permissions:
  contents: write          # 需要写权限来提交文件

jobs:
  run-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests serverchan-sdk

      # ========== 1. 运行 NVD CVE 推送脚本 ==========
      - name: Run NVD CVE Push Service
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python CVE_PushService.py

      # 检查 NVD 脚本是否发现新漏洞
      - name: Check NVD new vulnerabilities
        id: check_nvd
        run: |
          if [ -f new_vulns.flag ]; then
            echo "nvd_new=true" >> $GITHUB_ENV
            echo "---- NVD New Vulnerabilities Found ----"
            cat new_vulns.flag
            echo "----------------------------------------"
          else
            echo "nvd_new=false" >> $GITHUB_ENV
            echo "No new NVD vulnerabilities."
          fi

      # 可选：上传 NVD 日志（仅当有新漏洞时）
      - name: Upload NVD log (if new vulns)
        if: env.nvd_new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nvd-cveflows-log
          path: cveflows.log
          retention-days: 7

      # ========== 2. 运行 GitHub CVE 监听脚本 ==========
      - name: Run GitHub CVE Listener
        env:
          SCKEY: ${{ secrets.SCKEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python CVE_GhListener.py

      # ========== 3. 统一提交所有更改 ==========
      - name: Commit all changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 添加可能产生的所有文件
          git add vulns.db Github_CVE_Monitor.db docs/latest.json
          # 如果有任何变更则提交
          git diff --staged --quiet || (git commit -m "Update all CVE data [skip ci]" && git push)

      # ========== 🔥 新增：自动刷新 jsdelivr CDN 缓存 ==========
      - name: Purge jsdelivr CDN cache
        if: success()
        run: |
          curl -s "https://purge.jsdelivr.net/gh/Lusong232/CVE_PushService@main/docs/latest.json"
          echo "✅ CDN 缓存已刷新"
